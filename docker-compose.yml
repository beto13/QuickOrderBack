services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickorder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=quickorder;Username=postgres;Password=postgres"
      Sqs__Region: "us-east-1"
      Sqs__QueueUrl: "${SQS_QUEUE_URL}"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=quickorder;Username=postgres;Password=postgres"
      Sqs__Region: "us-east-1"
      Sqs__QueueUrl: "${SQS_QUEUE_URL}"
      SignalR__HubUrl: "http://api:8080/hubs/orders"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
